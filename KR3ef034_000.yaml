body:
  text: 傷寒心要論夫傷寒者前三日在表法當汗可用雙解散連進數服必愈若不解者病已傳變後三日在裡法當下殊不知下之太早表熱乘虛入里遂成結胸虛痞懊憹斑疹發黃之證輕者必危危者必死但當以平和之藥宣散其表和解其里病勢或有汗而愈或無汗而愈當用小柴胡涼膈天水三藥合而服之病若半在表半在裡法當和解小柴胡涼膈主之若裡熱微者則當微下大柴胡合解毒湯主之熱勢未退又以大柴胡合三一承氣湯下之兩除表裡之熱病至七八日里證已甚表熱漸微脈雖浮數則以三一承氣合解毒下之其病胸膈滿悶或喘或嘔陽脈緊甚者可用瓜蒂散湧之汗吐下三法之後別無異證者涼膈散調之大熱已去微熱者以益元散服之無令再病此傷寒治法之大要也或傷風自汗脈浮緩者雙解去麻黃以汗之其病半表半裡白虎湯和解之病在裡脈沉細者無問風寒暑濕或表裡證俱不已或內外諸邪所傷有汗無汗心腹痛滿譫語煩躁蓄熱內盛但是脈沉者並用承氣合解毒下之或中暑自汗解以白虎湯直格云夏至前為熱夏至後為暑是以至後而用白虎宜乎局方立秋後不用白虎子和云若有白虎證亦不用乎卻用詳審之耳白虎解後以五苓合天水調之多進數服無妨或腹滿脈沉者亦當承氣合解毒微下之或發汗之後熱不解脈尚浮者白虎加蒼朮再解之或裡熱內盛陽厥極深皆因失下而成此證以致身冷脈微昏懵將死切不得以寒藥下之誤下即死又一輩庸醫妄言是陰厥便欲易換用真武四逆溫熱之劑投之下咽立死殊不知此證乃陰耗陽竭陰氣極弱謂之耗陽厥極深謂之竭蓄熱怫鬱將欲死者凡此之證寒劑熱劑俱不可投但進涼膈解毒以養陰退陽宣散蓄熱脈氣漸生得大汗而愈使汗氣和而愈者未愈卻解毒合承氣下之次以解毒涼膈天水合而為一調合陰陽洗滌臟腑則其他別證自不生矣有大下之後熱不退再三下之熱愈盛若下之不愈脈微氣虛力弱不加以法則無可生之理若輟而不下則邪熱盛極陰氣極衰脈息斷絶必不可救似此之證是下之亦死不下亦死醫者至此活人殺人一彈指間其不至手足失措者幾希矣直格云傷寒汗後汗出不解或反不汗脈尚浮白虎加蒼朮湯再解之又按餘論云傷寒下後自汗虛熱不已白虎加蒼朮人參一服如神汗止身涼此通仙之法也如此則汗下之後熱不退無問有汗無汗通宜白虎加蒼朮解之又加人參亦妙仍服涼膈解毒調之經云三下而熱不退者即死後人有四五次下以至十數行而生者此乃誤中耳活者未一二死者千百後學切不可以為法但當依前用解毒合涼膈調之使陽熱除退陰氣漸生庶不失命若傷飲不解散或結胸之證臨時擇用大小陷胸湯丸纍下之脈浮者不可下是表證未除小柴胡合小陷胸湯投之脈雖浮而熱太極者大承氣徐徐疏利之或有留飲過度濕熱內生小便自利濕熱未退以解毒湯治之陽證生斑涼膈加當歸怫鬱熱盛在表燥而無汗濕熱在裡不能發於外相搏遂成發黃茵陳蒿湯調五苓散茵陳合承氣下之心煩不得眠梔子豉湯誤下太早遂成結胸虛痞涼膈加枳殼桔梗剛柔二痓譫語發狂逾垣赴井皆陽熱極盛者承氣合解毒下之汗下後煩渴飲水則涼膈減桂五苓桂苓甘露飲益元選而用之小便不通五苓泄之大便閉結承氣下之更有外證加減防風通聖散方內隨證用藥婦人證治皆然惟三四月並七八月不用硝其餘月分用之無妨小兒減劑服之此中有古人治傷寒不傳之妙後之學者其慎寶之寒第一雙解散防風通聖散防風去蘆川芎當歸焙赤芍藥大黃麻黃連翹芒硝各半兩石膏黃芩去枯桔梗各一兩甘草二兩滑石三兩荊芥白朮梔子各二錢半薄荷葉半兩上為末每服三錢水一盞薑三片煎至六分溫服大黃芒硝麻黃三味對證旋入自利去大黃芒硝自汗去麻黃天水散益元散六一散滑石六兩甘草一兩上為末每服三錢溫水蜜調下暑月冷水亦可和解傷寒傷風發汗加蔥白五寸豆豉五十粒煎一盞調四五錢並三服解利為度加薄荷尤妙通聖合益元上七兩和勻每服三錢水一盞半蔥白五寸豆豉五十粒薑三片煎至一盞溫服第二小柴胡涼膈天水合服小柴胡湯北柴胡三兩黃芩人參半夏生薑甘草各一兩大棗四枚上為散每服五錢涼膈散連翹二兩梔子大黃薄荷黃芩甘草芒硝各一兩上為散每服三錢水一盞煎至七分入蜜少許竹葉五片第三涼膈合小柴胡第四大柴胡合黃連解毒湯大柴胡湯柴胡去苗大黃各半兩黃芩白芍藥各一分半夏泡水飲二錢枳實生三錢上為散分三服水一盞半生薑三片大棗一枚煎至半盞溫服黃連解毒湯黃連黃柏黃芩梔子各等分上為散每服一兩水一盞煎至五分溫服第五大柴胡合三一承氣湯三一承氣湯大黃芒硝厚朴枳實各半兩甘草一兩上銼每服二錢半水一大盞薑三片煎至六分入硝再煎一二沸服第六三一承氣合解毒湯第七瓜蒂散瓜蒂散瓜蒂赤小豆各等分上為末豆豉湯調下一錢未吐再服第八涼膈散第九益元散風第十雙解散去麻黃第十一白虎湯白虎湯知母一兩半甘草一兩粳米一合石膏四兩上銼每服五錢水一盞煎至六分溫服第十二承氣合解毒湯暑第十三白虎湯第十四五苓散合天水散五苓散豬苓茯苓去皮各三錢官桂一分澤瀉一兩白朮一錢活人書三分宣明論半錢上為末第十五承氣合解毒湯第十六白虎湯加蒼朮第十七涼膈合解毒湯第十八解毒合承氣湯第十九解毒涼膈天水合結胸第二十大小陷胸湯丸大陷胸湯大黃芒硝各二錢甘遂三字匕上銼四錢水一盞煎大黃至六分納硝再煎二沸納甘遂溫服未利再與小陷胸湯半夏四兩生薑切黃連各二錢栝蔞實半個全銼上銼水三盞煎栝蔞至盞半納藥煎至一盞分作兩服大陷胸丸大黃半兩葶藶二錢微炒芒硝一錢杏仁十二枚去皮尖柴炭炒變色上大黃為末研葶藶杏仁為膏丸如彈子大甘草末三字蜜半盞水一盞煎至半盞納硝溫服一丸一宿下若未利再與第二十一小柴胡合小陷胸湯第二十二大承氣湯大承氣湯大黃錦紋者芒硝朴硝有芒頭者厚朴去絲枳實各半兩上銼如麻豆大分一半用水一碗加生薑三片煎至六分納硝煎一二沸絞去滓熱服第二十三解毒湯發斑第二十四涼膈散加當歸發黃第二十五茵陳蒿湯調五苓散茵陳蒿湯茵陳一兩大黃半兩梔子十枚上銼水二盞煎至一盞溫服利為度第二十六茵陳合承氣心煩不眠第二十七梔子豉湯梔子豉湯梔子七個銼豆豉二合上水二盞先煮梔子至一盞半納豉煮至半盞絞汁溫服誤下虛痞第二十八涼膈加桔梗枳殼剛柔二痓第二十九承氣合解毒汗後煩渴第三十涼膈減桂五苓桂苓甘露飲益元散桂苓甘露飲茯苓一兩去皮澤瀉一兩甘草二兩炙石膏二兩寒水石二兩白朮半兩桂枝半兩去皮豬苓半兩滑石四兩上為末每服三錢溫湯調下或新汲水生薑湯尤妙上共十七方如無大承氣系第五三一承氣代之亦妙通三十九件藥味調理傷寒曲盡其妙百發百中後之學者詳辨脈證審而用之起沉疴於指掌策奇功以活人方知其妙也新增病後四方小半夏湯治汗下後嘔吐不已半夏五兩赤茯苓三兩上銼每服半兩水二盞煎至一盞半納薑汁更煎一二沸溫服五味子湯治汗下後氣閉咳嗽五味子半兩麥門冬人參杏仁陳皮生薑各一錢棗子二枚上銼每服二錢水二盞煎至一盞作二服大橘皮湯治汗後胃虛陳皮甘草各一兩人參二兩上銼每服五錢水一盞半薑二片煎至一盞溫服赤茯苓湯治胸膈滿悶頭痛已得汗者陳皮甘草人參半夏川芎白朮各等分赤茯苓上銼每服五錢水一盞半薑三片煎至一盞溫服傷寒心要餘論五臟六腑應五運六氣凡病微則當其本化甚則兼其鬼賊之化亢則害承乃制微則是其本經本腑之本化造化之化也病甚則如金衰不能制木木則生火木火者皆陽也故風火多兼化則風熱相搏賊其金也臟腑之氣應乎三陰三陽實則行乎本化之氣瀉之衰則行其勝己之氣瀉之是為殺其鬼賊也如諸陽蓄熱以涼膈合解毒服之解散極熱如瀉火熱解毒調胃承氣是也如吐法用二仙散如調理傷寒白虎涼膈合服解之傷寒三日以里連進雙解如無汗必是傳變待三四日之間以小柴胡解表裡之熱仍間服白虎涼膈蘊熱七八日之間欲下而表證猶在以大承氣湯大柴胡湯雙行並煎攻裡發表最為隱當若是溫熱內甚自利者止涼膈卻進解毒白虎服之或噁心乾嘔吐者白虎作一大劑調解毒末五錢服之即止大小便不通並有腹痛不能忍者以無灰酒煎朴硝三兩熱服即愈亦按從治之法也熱中伏寒下之矣或大承氣湯加木香瀉之尤妙傷寒失下始病時又誤服麻黃熱劑太甚必致熱極或有陽厥極深身冷脈微陽極似陰之證庸醫以為陰證是也須當急救其陰以白虎涼膈日進三服脈氣漸生身體漸溫然後以大承氣下之夫大承氣救急之妙劑如咽膈吐逆不利當令熱服開其熱結利而即愈也如傷寒汗下之後自汗虛熱不止於白虎湯內加人參蒼朮一服如神汗止身涼此法至妙無庸詳盡如赤白痢先服黃連阿膠丸次服解毒湯傷寒瘡瘍破傷風與傷寒治法一同但以雙解教與白虎承氣臨時斟酌用之雙解涼膈白虎瀉心此理傷寒之妙劑孕婦臨月可服益元涼胎産後仍服如血不盡則以涼膈與四物合煎調理經血甚者大承氣合四物乃瀉中之有補也涼膈同四物名玉燭散婦人産後之妙劑涼膈四物合大承氣湯名三和湯大承氣合四物治婦人一切血積血聚等疾加紅花尤妙初生兒五七日有熱證不得已只用益元散時時灌之如小兒夜啼用涼膈調之肚飢臨睡服凡瘡瘍癮疹涼膈加當歸治之
